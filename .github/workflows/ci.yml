name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ecopet
          POSTGRES_PASSWORD: ecopet_ci
          POSTGRES_DB: ecopet
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ecopet:ecopet_ci@localhost:5432/ecopet?schema=public
      DIRECT_URL: postgresql://ecopet:ecopet_ci@localhost:5432/ecopet?schema=public
      AUTH_SECRET: ci-auth-secret-minimum-32-characters-long
      NEXTAUTH_SECRET: ci-nextauth-secret-minimum-32-chars
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      JWT_SECRET: ci-jwt-secret-minimum-32-characters-long
      NODE_ENV: test
      NODE_OPTIONS: --max-old-space-size=8192
      AUTH_RATE_LIMIT_RELAXED: "1"
      AUTH_TEST_RESET_RATE_LIMIT: "1"
      AUTH_TEST_EXPOSE_OTP: "1"
      PHONE_SMS_RECOVERY_ENABLED: "1"
      AI_ENABLED: "false"
      PAYMENT_PROVIDER: none
      UPLOAD_DEV_FALLBACK: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run db:migrate:deploy
        working-directory: packages/database

      - run: npm run type-check

      - run: npm run lint

      - run: npm run build

      - run: npm run test:no-mocks

      - run: npm run test:i18n

      - run: npm run test:sync-env

      - name: Start web server
        run: |
          AUTH_TEST_EXPOSE_OTP=1 PHONE_SMS_RECOVERY_ENABLED=1 AUTH_RATE_LIMIT_RELAXED=1 AUTH_TEST_RESET_RATE_LIMIT=1 npm run start -w @ecopet/web &
          npx wait-on http://localhost:3000/api/health --timeout 180000

      - name: Foundation + security suites
        run: |
          WEB_URL=http://localhost:3000 npm run test:foundation:auth
          WEB_URL=http://localhost:3000 npm run test:security
          WEB_URL=http://localhost:3000 npm run test:foundation:talkjs
          WEB_URL=http://localhost:3000 npm run test:foundation:marketplace
          WEB_URL=http://localhost:3000 npm run test:foundation:cart
          WEB_URL=http://localhost:3000 npm run test:foundation:orders
          WEB_URL=http://localhost:3000 npm run test:foundation:social
          WEB_URL=http://localhost:3000 npm run test:foundation:notifications
          WEB_URL=http://localhost:3000 npm run test:foundation:ai
          WEB_URL=http://localhost:3000 npm run test:foundation:gestor

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E mínimo
        run: WEB_URL=http://localhost:3000 npm run test:e2e -- e2e/foundation-flow.spec.ts
