services:
  postgres:
    image: postgres:16-alpine
    container_name: ecopet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecopet
      POSTGRES_USER: ecopet
      POSTGRES_PASSWORD: ecopet_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ecopet_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecopet -d ecopet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecopet_pg_data:
